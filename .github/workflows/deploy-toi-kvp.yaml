name: toi-kvp

on:
  push:
    paths:
    - apps/toi-kvp/**
    - .github/workflows/deploy-toi-kvp.yaml
    - .github/workflows/deploy-toi-template.yaml
    - buildSrc/**
    - technical-libs/testrapid/**
    - technical-libs/logging/**
  workflow_dispatch:

jobs:
  build-deploy:
    uses: ./.github/workflows/deploy-toi-template.yaml
    with:
      app_name: ${{ github.workflow }}
      deploy_dev_branch: refs/heads/lib-for-logging
    secrets: inherit
    permissions:
      contents: read
      id-token: write
      security-events: write
